name: Build

on: push

permissions:
  contents: read
  id-token: write

jobs:
  Build:
    name: Build
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-node@v4
      with:
        node-version: '24'
        registry-url: 'https://registry.npmjs.org'

    - name: npm install
      run: npm install

    - name: Build
      run: npm run build

    - name: Publish
      run: npm publish --provenance --access public
